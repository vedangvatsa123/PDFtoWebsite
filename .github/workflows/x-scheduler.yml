name: Social Media Scheduler (X + Bluesky + Blogger)

on:
  schedule:
    - cron: '30 3 * * *'     # 11:30 SGT / 09:00 IST — Morning thread
    - cron: '30 11 * * *'    # 19:30 SGT / 17:00 IST — Afternoon insight
    - cron: '30 19 * * *'    # 03:30 SGT / 01:00 IST — Evening engagement
  workflow_dispatch:
    inputs:
      slot:
        description: 'Content slot to post (thread, insight, engagement)'
        required: false
        default: 'engagement'
      sync_only:
        description: 'Only run the job sync (skip posting)'
        type: boolean
        default: false
      mass_scan:
        description: 'Check all 19k+ jobs for 404s in parallel'
        type: boolean
        default: false

concurrency:
  group: social-poster-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine content slot
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 3 * * *" ]; then
            # PAUSED: thread posting disabled until X display issue is resolved
            echo "slot=insight" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 11 * * *" ]; then
            echo "slot=insight" >> $GITHUB_OUTPUT
          else
            echo "slot=engagement" >> $GITHUB_OUTPUT
          fi
          echo "Content slot: $(cat $GITHUB_OUTPUT)"

      - name: Post to X and commit state
        continue-on-error: true
        env:
          X_CONSUMER_KEY:        ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET:     ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_POST_SLOT:           ${{ steps.slot.outputs.slot }}
        run: |
          echo "🎯 Posting slot: $X_POST_SLOT"
          node .github/scripts/x-post.mjs
          git add .github/scripts/x-state.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: advance X $X_POST_SLOT index [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || sleep $((i * 3))
            done
          fi

      - name: Post to Bluesky and commit state
        continue-on-error: true
        env:
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: |
          node .github/scripts/bsky-post.mjs
          git add .github/scripts/bsky-state.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: advance Bluesky post index [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || sleep $((i * 3))
            done
          fi

      - name: Post to Blogger and commit state
        continue-on-error: true
        if: steps.slot.outputs.slot == 'thread'
        env:
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: |
          node .github/scripts/blogger-post.mjs
          git add .github/scripts/blogger-state.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: advance Blogger post index [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || sleep $((i * 3))
            done
          fi

      - name: Sync remote jobs
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/jobs-sync.mjs

      - name: Prune dead job links
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MASS_SCAN: ${{ github.event.inputs.mass_scan }}
        run: node .github/scripts/prune-404s.mjs

      - name: Post jobs to Telegram
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/telegram-post.mjs

      - name: Post AI jobs to @hashtag_ai
        continue-on-error: true
        env:
          TELEGRAM_AI_BOT_TOKEN: ${{ secrets.TELEGRAM_AI_BOT_TOKEN }}
          TELEGRAM_AI_CHANNEL_ID: '@hashtag_ai'
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node .github/scripts/telegram-ai-jobs.mjs
          git add .github/scripts/.telegram-ai-jobs-posted.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update AI jobs dedup state [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || sleep $((i * 3))
            done
          fi
