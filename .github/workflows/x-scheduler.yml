name: Social Media Scheduler (X + Bluesky + Blogger)

on:
  schedule:
    - cron: '30 19 * * *'   # 01:00 IST
    - cron: '30 3 * * *'    # 09:00 IST
    - cron: '30 11 * * *'   # 17:00 IST
  workflow_dispatch:        # manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Post to X
        env:
          X_CONSUMER_KEY:        ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET:     ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node .github/scripts/x-post.mjs

      - name: Post to Bluesky
        env:
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: node .github/scripts/bsky-post.mjs

      - name: Post to Blogger
        env:
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: node .github/scripts/blogger-post.mjs

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/scripts/x-state.json .github/scripts/bsky-state.json .github/scripts/blogger-state.json
          git diff --staged --quiet || git commit -m "chore: advance post index [skip ci]"
          git push
