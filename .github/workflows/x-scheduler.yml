name: X Post Scheduler

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00am IST
    - cron: '30 10 * * *'  # 4:00pm IST
    - cron: '30 18 * * *'  # 12:00am IST
  workflow_dispatch:        # manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit state back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post to X
        env:
          X_CONSUMER_KEY:        ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET:     ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node .github/scripts/x-post.mjs

      - name: Commit updated post index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/x-state.json
          git diff --staged --quiet || git commit -m "chore: advance X post index [skip ci]"
          git push
