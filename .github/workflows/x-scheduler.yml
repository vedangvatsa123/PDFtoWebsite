name: Jobs Sync + Telegram (8h cadence)

on:
  schedule:
    - cron: '30 3 * * *'     # 11:30 SGT — Morning
    - cron: '30 11 * * *'    # 19:30 SGT — Afternoon
    - cron: '30 19 * * *'    # 03:30 SGT — Evening
  workflow_dispatch:
    inputs:
      sync_only:
        description: 'Only run the job sync (skip posting)'
        type: boolean
        default: false
      mass_scan:
        description: 'Check all 19k+ jobs for 404s in parallel'
        type: boolean
        default: false

concurrency:
  group: jobs-telegram-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync remote jobs
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/jobs-sync.mjs

      - name: Prune dead job links
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MASS_SCAN: ${{ github.event.inputs.mass_scan }}
        run: node .github/scripts/prune-404s.mjs

      - name: Post jobs to Telegram
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/telegram-post.mjs

      - name: Post AI jobs to @hashtag_ai
        continue-on-error: true
        env:
          TELEGRAM_AI_BOT_TOKEN: ${{ secrets.TELEGRAM_AI_BOT_TOKEN }}
          TELEGRAM_AI_CHANNEL_ID: '@hashtag_ai'
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node .github/scripts/telegram-ai-jobs.mjs
          git add .github/scripts/.telegram-ai-jobs-posted.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update AI jobs dedup state [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || sleep $((i * 3))
            done
          fi
